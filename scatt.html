<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SCATT Pro | Steyr LP Edition</title>

<style>
:root {
--bg-main: #f4f1eb;
--bg-grad: radial-gradient(circle at center, #fdfbf7 0%, #e8e4d9 100%);
--panel-bg: rgba(255, 255, 255, 0.95);
--text-dark: #1a1a1a;
--text-muted: #666;
--accent-sage: #2d5a27;
--accent-terra: #b45309;
--trace-live: #2563eb;
--trace-history: rgba(100, 116, 139, 0.3);
--danger: #dc2626;
}

* {
box-sizing: border-box;
margin: 0;
padding: 0;
font-family: 'Segoe UI', system-ui, sans-serif;
}

body {
background: var(--bg-main);
color: var(--text-dark);
min-height: 100vh;
overflow: hidden;
transition: overflow 0.1s;
cursor: crosshair;
}
body.game-active {
overflow: auto;
-webkit-overflow-scrolling: touch;
}

.screen {
position: relative;
min-height: 100vh;
width: 100%;
display: flex;
align-items: center;
justify-content: center;
}
.hidden {
display: none !important;
}

.card {
background: var(--panel-bg);
padding: 1.5rem;
border-radius: 1rem;
border: 1px solid #d1d5db;
width: 95%;
max-width: 440px;
box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
text-align: center;
}

h1 {
font-weight: 800;
text-transform: uppercase;
letter-spacing: 1px;
color: var(--accent-sage);
font-size: 1.2rem;
margin-bottom: 1rem;
}

/* SCATT HUD - Fixed top bar */
.match-stats {
position: fixed;
top: 0;
left: 0;
right: 0;
width: 100%;
background: #000;
color: #0f0;
padding: 10px 16px;
display: flex;
justify-content: space-between;
font-family: monospace;
font-size: 0.9rem;
z-index: 100;
letter-spacing: 0.5px;
}
.match-stats-center {
display: flex;
flex-direction: column;
align-items: center;
gap: 2px;
}
.aggregate-score {
color: #fbbf24;
font-size: 1.1rem;
font-weight: bold;
}

/* Scrollable game container */
#game-scroll {
display: none;
flex-direction: column;
min-height: 100vh;
padding-top: 44px;
padding-bottom: 180px;
}
#game-scroll.active {
display: flex;
}

/* Target section */
#target-section {
position: relative;
min-height: calc(100vh - 44px - 180px);
display: flex;
align-items: center;
justify-content: center;
background: var(--bg-grad);
flex-shrink: 0;
overflow: hidden;
cursor: crosshair;
}

#target-master {
position: relative;
background: #fff;
display: flex;
align-items: center;
justify-content: center;
border-radius: 50%;
box-shadow: 0 0 0 1px #ccc, 0 4px 20px rgba(0, 0, 0, 0.12);
overflow: visible;
}
.ring-black {
position: absolute;
border-radius: 50%;
background: #000;
}
.ring-10 {
position: absolute;
border-radius: 50%;
background: var(--danger);
}

#bullseye-coord {
position: absolute;
left: 50%;
top: 50%;
width: 0;
height: 0;
transform: translate(-50%, -50%);
pointer-events: none;
}

#live-trace-canvas {
position: absolute;
inset: 0;
pointer-events: none;
z-index: 5;
opacity: 0.75;
}

/* SIGHTS */
#sight-base {
position: absolute;
top: 50%;
left: 50%;
z-index: 10;
pointer-events: none;
transition: none;
will-change: transform;
}
.front-i {
position: absolute;
bottom: 50%;
left: 50%;
transform: translateX(-50%);
width: 12px;
height: 40px;
background: #000;
border-top: 2px solid #444;
}
.rear-u {
position: absolute;
bottom: 8px;
left: 50%;
transform: translateX(-50%);
width: 60px;
height: 40px;
border-left: 20px solid #000;
border-right: 20px solid #000;
border-bottom: 20px solid #000;
}
#aim-tip {
position: absolute;
top: 0;
left: 50%;
width: 4px;
height: 4px;
background: red;
border-radius: 50%;
transform: translate(-50%, -50%);
}

/* ANALYSIS SECTION */
#analysis-section {
background: #f4f1eb;
padding: 1rem;
flex-shrink: 0;
min-height: 50vh;
}
#analysis-section .card {
margin: 0 auto;
max-width: 440px;
}
#analysis-placeholder {
color: var(--text-muted);
font-size: 0.85rem;
padding: 2rem 0;
text-align: center;
}
#analysis-content {
display: none;
}
#analysis-content.visible {
display: block;
}

.coaching-box {
background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
color: white;
padding: 12px 16px;
border-radius: 8px;
margin: 12px 0;
text-align: left;
border-left: 4px solid #fbbf24;
}
.coaching-box strong {
display: block;
font-size: 0.75rem;
text-transform: uppercase;
letter-spacing: 0.5px;
margin-bottom: 4px;
color: #fbbf24;
}
.coaching-box p {
font-size: 0.9rem;
line-height: 1.4;
margin: 0;
}

.target-specs {
background: #111;
color: #eee;
padding: 12px;
border-radius: 6px;
margin: 12px 0;
text-align: left;
font-size: 0.7rem;
font-family: monospace;
}
.target-specs h4 {
color: #fbbf24;
font-size: 0.75rem;
margin-bottom: 8px;
text-transform: uppercase;
letter-spacing: 1px;
}
.target-specs .spec-line {
display: flex;
justify-content: space-between;
padding: 4px 0;
border-bottom: 1px solid #333;
}
.target-specs .spec-line:last-child {
border-bottom: none;
}

.scatt-monitor {
background: #111;
color: #eee;
padding: 10px;
border-radius: 6px;
margin: 10px 0;
text-align: left;
}
#trace-canvas {
background: #1a1a1a;
width: 100%;
height: 220px;
border-radius: 4px;
margin-top: 5px;
display: block;
}

.stat-row {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 8px;
margin-top: 8px;
}
.stat-item {
background: #222;
padding: 8px;
border-radius: 4px;
border-left: 3px solid var(--accent-sage);
}
.stat-item.full-width {
grid-column: 1 / -1;
border-left-color: var(--accent-terra);
}
.stat-item label {
display: block;
font-size: 0.6rem;
color: #888;
text-transform: uppercase;
}
.stat-item span {
font-family: monospace;
font-size: 1rem;
font-weight: bold;
color: #fff;
}

.btn {
background: var(--accent-sage);
color: white;
border: none;
padding: 0.8rem;
border-radius: 0.5rem;
font-weight: bold;
cursor: pointer;
width: 100%;
margin-top: 10px;
font-size: 0.95rem;
transition: background 0.2s, transform 0.1s;
-webkit-tap-highlight-color: transparent;
}
.btn:active {
background: #1e3d1a;
transform: scale(0.97);
}
.btn-dark {
background: #111;
color: #eee;
}
.btn-dark:active {
background: #000;
transform: scale(0.97);
}

/* Fixed bottom controls */
#controls {
position: fixed;
bottom: 0;
left: 0;
right: 0;
width: 100%;
display: flex;
justify-content: space-between;
align-items: center;
padding: 15px 20px 25px;
z-index: 70;
background: linear-gradient(to top, rgba(244, 241, 235, 0.98) 60%, rgba(244, 241, 235, 0));
pointer-events: none;
}
#controls > * {
pointer-events: auto;
}
.d-pad {
width: 120px;
height: 120px;
background: rgba(255, 255, 255, 0.85);
border-radius: 50%;
position: relative;
box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
-webkit-tap-highlight-color: transparent;
}
.d-btn {
position: absolute;
width: 42px;
height: 42px;
background: #fff;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
border: 1px solid #ccc;
font-weight: bold;
font-size: 1rem;
user-select: none;
-webkit-user-select: none;
-webkit-tap-highlight-color: transparent;
transition: background 0.1s;
touch-action: manipulation;
}
.d-btn:active {
background: #e5e7eb;
}
.btn-up {
top: 0;
left: 39px;
}
.btn-down {
bottom: 0;
left: 39px;
}
.btn-left {
top: 39px;
left: 0;
}
.btn-right {
top: 39px;
right: 0;
}
.d-center {
position: absolute;
top: 39px;
left: 39px;
width: 42px;
height: 42px;
background: #ddd;
border-radius: 50%;
}

#fire-btn {
width: 80px;
height: 80px;
border-radius: 50%;
background: var(--danger);
color: white;
border: 4px solid #fff;
font-weight: 900;
font-size: 0.85rem;
cursor: pointer;
box-shadow: 0 6px 20px rgba(220, 38, 38, 0.4);
-webkit-tap-highlight-color: transparent;
transition: transform 0.08s, box-shadow 0.08s;
touch-action: manipulation;
user-select: none;
-webkit-user-select: none;
}
#fire-btn:active {
transform: scale(0.9);
box-shadow: 0 2px 8px rgba(220, 38, 38, 0.5);
}

/* Scroll hint */
#scroll-hint {
position: absolute;
bottom: 12px;
left: 50%;
transform: translateX(-50%);
z-index: 20;
color: #999;
font-size: 0.7rem;
text-align: center;
pointer-events: none;
animation: bounce-down 2s ease-in-out infinite;
letter-spacing: 1px;
}
@keyframes bounce-down {
0%,
100% {
transform: translateX(-50%) translateY(0);
opacity: 0.5;
}
50% {
transform: translateX(-50%) translateY(8px);
opacity: 1;
}
}
#scroll-hint.hidden-hint {
opacity: 0;
animation: none;
}

@media (max-width: 400px) {
.d-pad {
width: 100px;
height: 100px;
}
.d-btn {
width: 36px;
height: 36px;
}
.btn-up {
top: 0;
left: 32px;
}
.btn-down {
bottom: 0;
left: 32px;
}
.btn-left {
top: 32px;
left: 0;
}
.btn-right {
top: 32px;
right: 0;
}
.d-center {
top: 32px;
left: 32px;
width: 36px;
height: 36px;
}
#fire-btn {
width: 68px;
height: 68px;
font-size: 0.75rem;
}
#controls {
padding: 10px 15px 20px;
}
#game-scroll {
padding-bottom: 155px;
}
#target-section {
min-height: calc(100vh - 44px - 155px);
}
}
</style>

</head>
<body>
