<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SCATT Pro | Steyr LP Edition</title>
<style>
:root {
--bg-dark: #0c0c0e;
--panel-steel: #1a1a1e;
--accent-gold: #d4af37;
--swiss-yellow: #ffcc00;
/* SCALED FOR 1-METER VIEWING DISTANCE (1cm = 37.8px) */
--tgt-card: calc(1.70 * 37.8px);
--tgt-black: calc(0.59 * 37.8px);
--tgt-10ring: calc(0.12 * 37.8px);
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; user-select: none; }
body { background: var(--bg-dark); color: #fff; height: 100vh; overflow: hidden; touch-action: none; }

.screen {
position: fixed; inset: 0; z-index: 100;
display: flex; align-items: center; justify-content: center;
background: radial-gradient(circle at center, #1e1e22 0%, #0c0c0e 100%);
}
.hidden { display: none !important; }

.glass-card {
background: var(--panel-steel); padding: 2.5rem; border-radius: 4px;
width: 90%; max-width: 450px; border: 1px solid #2d2d33;
box-shadow: 0 30px 60px rgba(0,0,0,0.8); text-align: center;
}

h1 { font-weight: 200; letter-spacing: 4px; text-transform: uppercase; color: var(--accent-gold); margin-bottom: 1rem; }

.input-group { text-align: left; margin-bottom: 1.5rem; }
label { font-size: 0.6rem; color: #71717a; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
input { width: 100%; padding: 12px; background: #0c0c0e; border: 1px solid #333; color: #fff; outline: none; margin-top: 5px; }

.mode-btn {
background: #27272a; border: 1px solid #3f3f46; color: #fff;
padding: 1.2rem; width: 100%; margin-bottom: 0.8rem; border-radius: 2px;
cursor: pointer; transition: 0.2s; text-align: left; display: flex; justify-content: space-between; align-items: center;
}
.mode-btn:hover { border-color: var(--accent-gold); }

/* Range Viewport */
#viewport {
position: relative; width: 100vw; height: 100vh;
background: linear-gradient(to bottom, #2d3748, #0f172a);
display: flex; align-items: center; justify-content: center;
}

.hud-overlay {
position: absolute; top: 0; width: 100%; padding: 15px 30px;
display: flex; justify-content: space-between; align-items: center;
background: rgba(0,0,0,0.85); border-top: 3px solid var(--swiss-yellow); z-index: 60;
}

/* Standardized Target Scaling */
#target-master {
position: absolute; width: var(--tgt-card); height: var(--tgt-card);
background: #ffffff; border: 1px solid #ddd;
display: flex; align-items: center; justify-content: center;
box-shadow: 0 0 50px rgba(0,0,0,0.5);
}
.ring-black { position: absolute; border-radius: 50%; width: var(--tgt-black); height: var(--tgt-black); background: #111; }
.ring-10 { position: absolute; border-radius: 50%; width: var(--tgt-10ring); height: var(--tgt-10ring); border: 0.2px solid rgba(255,255,255,0.5); }

/* Sights */
#sight-base { position: absolute; top: 50%; left: 50%; z-index: 10; pointer-events: none; }
#sight-layer { position: absolute; transform: translate(-50%, -50%); }
.front-blade { position: absolute; bottom: 50%; left: 50%; transform: translateX(-50%); width: 14px; height: 48px; background: #000; border-top: 1.5px solid #333; }
.rear-notch { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); width: 70px; height: 48px; border-left: 24px solid #000; border-right: 24px solid #000; border-bottom: 24px solid #000; }

/* SCATT Monitor */
.monitor-frame { background: #f8fafc; color: #1e293b; padding: 1.5rem; border-radius: 2px; text-align: left; }
canvas { background: #fff; width: 100%; height: 220px; border: 1px solid #cbd5e1; margin: 10px 0; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.stat-box { background: #fff; padding: 8px; border: 1px solid #e2e8f0; border-radius: 2px; }
.stat-box small { font-size: 0.6rem; color: #94a3b8; font-weight: 800; text-transform: uppercase; display: block; }

/* Controls */
#controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; pointer-events: none; z-index: 70; }
.joy-base { pointer-events: auto; position: relative; width: 140px; height: 140px; background: #111; border-radius: 50%; border: 3px solid #000; }
.btn-move { position: absolute; width: 44px; height: 44px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #555; font-size: 0.7rem; }
#fire-btn { pointer-events: auto; width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #ef4444, #991b1b); border: 4px solid #000; color: #fff; font-weight: 900; box-shadow: 0 10px 20px rgba(0,0,0,0.4); cursor: pointer;}

.premium-btn { background: var(--accent-gold); color: #000; padding: 15px; width: 100%; border: none; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }
</style>
</head>
<body>

<div id="app">
<div id="setup-screen" class="screen">
<div class="glass-card">
<h1>Steyr LP-10</h1>
<div class="input-group">
<label>Shoulder Height (meters)</label>
<input type="number" id="sh-in" value="1.48" step="0.01">
</div>
<button class="mode-btn" onclick="setMode('qualification')">
<span>Qualification</span><b>60 Shots</b>
</button>
<button class="mode-btn" onclick="setMode('final')">
<span>Olympic Final</span><b>24 Shots</b>
</button>
</div>
</div>

<div id="viewport" class="hidden">
<div class="hud-overlay">
<div style="color:var(--swiss-yellow)">SHOT <span id="hud-shot">1</span>/<span id="hud-max">24</span></div>
<div id="hud-timer" style="font-family:monospace; font-size:1.4rem">60.00</div>
<div>SCORE: <span id="hud-total">0.0</span></div>
</div>

<div id="target-master">
<div class="ring-black"></div>
<div class="ring-10"></div>
<div id="bullseye-coord" style="position:absolute"></div>
</div>

<div id="sight-base">
<div id="sight-layer">
<div class="front-blade"><div id="aim-tip" style="position:absolute;top:0;left:50%"></div></div>
<div class="rear-notch"></div>
</div>
</div>

<div id="controls">
<div class="joy-base">
<div class="btn-move" style="top:5px;left:48px;" onmousedown="move(0,-1.2)" onmouseup="stop()" ontouchstart="move(0,-1.2)" ontouchend="stop()">UP</div>
<div class="btn-move" style="bottom:5px;left:48px;" onmousedown="move(0,1.2)" onmouseup="stop()" ontouchstart="move(0,1.2)" ontouchend="stop()">DOWN</div>
<div class="btn-move" style="left:5px;top:48px;" onmousedown="move(-1.2,0)" onmouseup="stop()" ontouchstart="move(-1.2,0)" ontouchend="stop()">LEFT</div>
<div class="btn-move" style="right:5px;top:48px;" onmousedown="move(1.2,0)" onmouseup="stop()" ontouchstart="move(1.2,0)" ontouchend="stop()">RIGHT</div>
</div>
<button id="fire-btn" onclick="fire()">RELEASE</button>
</div>
</div>

<div id="scatt-screen" class="screen hidden">
<div class="glass-card" style="background:#e2e8f0; max-width:500px;">
<div class="monitor-frame">
<div style="display:flex; justify-content:space-between; align-items:flex-end; border-bottom:2px solid #cbd5e1; padding-bottom:5px;">
<span id="sc-label" style="font-weight:800; color:#64748b; font-size:0.7rem;">ANALYSIS</span>
<span id="sc-score" style="font-size:2.5rem; font-weight:900; color:#0f172a">10.9</span>
</div>
<canvas id="trace-canvas"></canvas>
<div class="stat-grid">
<div class="stat-box"><small>Stability</small><b><span id="sc-hold">0</span>%</b></div>
<div class="stat-box"><small>Realization</small><b><span id="sc-real">0</span>%</b></div>
<div class="stat-box"><small>Drop Comp</small><b><span id="sc-drop">1.98</span>cm</b></div>
<div class="stat-box"><small>Hold Time</small><b><span id="sc-time">0.0</span>s</b></div>
</div>
</div>
<div id="trivia-box" style="padding:15px; font-size:0.8rem; color:#475569; text-align:left; border-left:3px solid var(--accent-gold); margin:15px 0;"></div>
<button class="premium-btn" onclick="nextShot()">Next Sequence</button>
</div>
</div>
</div>

<script>
const trivia = [
"Steyr pellets travel at ~157m/s, taking 0.063s to reach the target.",
"At 10m, gravity pulls the pellet down nearly 2cm during its flight.",
"The 10-ring is only 1.15mm wide — roughly the thickness of a credit card.",
"Match pistols have a minimum trigger weight of 1,000g for safety.",
"The ISSF target center is exactly 1.40 meters above the floor."
];

const state = {
sh: 1.48, mode: 'final', maxShots: 24, shotNum: 1, total: 0,
userX: 0, userY: 0, oscTime: 0,
timer: 60, timerInt: null,
currentTrace: [], isFiring: false,
pelletDropPx: 0,
audio: new (window.AudioContext || window.webkitAudioContext)()
};

function setMode(m) {
state.sh = parseFloat(document.getElementById('sh-in').value);
state.mode = m;
state.maxShots = (m === 'qualification') ? 60 : 24;

// --- PHYSICS CALCULATION ---
const velocity = 157.5; // Average Steyr Velocity (m/s)
const timeOfFlight = 10 / velocity;
const dropMeters = 0.5 * 9.8 * Math.pow(timeOfFlight, 2);
// Offset by shoulder height vs target height (1.40m)
const heightDiff = 1.40 - state.sh;
state.pelletDropPx = (dropMeters * 100 * 37.8);

document.getElementById('hud-max').innerText = state.maxShots;
document.getElementById('setup-screen').classList.add('hidden');
document.getElementById('viewport').classList.remove('hidden');

startMatch();
}

function startMatch() {
resetShot();
requestAnimationFrame(loop);
}

function resetShot() {
state.timer = 60;
state.currentTrace = [];
state.userX = 0; state.userY = 0;
state.isFiring = false;
document.getElementById('hud-shot').innerText = state.shotNum;
document.getElementById('hud-total').innerText = state.total.toFixed(1);
startTimer();
}

function startTimer() {
clearInterval(state.timerInt);
state.timerInt = setInterval(() => {
state.timer -= 0.01;
document.getElementById('hud-timer').innerText = state.timer.toFixed(2);
if(state.timer <= 0) fire(true);
}, 10);
}

function loop() {
if(state.isFiring) return;
state.oscTime += 0.012;

// Professional Oscillation (Subtle)
const ox = (Math.sin(state.oscTime * 0.8) * 3) + (Math.sin(state.oscTime * 2.2) * 1);
const oy = (Math.cos(state.oscTime * 0.7) * 2.5) + (Math.sin(state.oscTime * 1.6) * 1.5);

const tx = state.userX + ox;
const ty = state.userY + oy;

document.getElementById('sight-layer').style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px))`;

const bull = document.getElementById('bullseye-coord').getBoundingClientRect();
const tip = document.getElementById('aim-tip').getBoundingClientRect();

// Log trace relative to bullseye
state.currentTrace.push({ x: tip.left - bull.left, y: tip.top - bull.top });
requestAnimationFrame(loop);
}

let mInt;
function move(dx, dy) { mInt = setInterval(() => { state.userX += dx; state.userY += dy; }, 16); }
function stop() { clearInterval(mInt); }

function fire(timeout = false) {
state.isFiring = true;
clearInterval(state.timerInt);
beep(140, 'square', 0.08);

let score = 0;
if(!timeout) {
const lp = state.currentTrace[state.currentTrace.length - 1];
// Apply physics: Vertical drop added to the Y coordinate of the aim point
const impactY = lp.y + state.pelletDropPx;
const dist = Math.hypot(lp.x, impactY) / 37.8;
score = Math.max(0, (11.0 - (dist / 0.08))).toFixed(1);
}
state.total += parseFloat(score);
showScatt(score);
}

function showScatt(score) {
document.getElementById('viewport').classList.add('hidden');
document.getElementById('scatt-screen').classList.remove('hidden');
document.getElementById('sc-score').innerText = score;
document.getElementById('sc-time').innerText = (60 - state.timer).toFixed(1);
document.getElementById('sc-drop').innerText = (state.pelletDropPx / 37.8).toFixed(2);

// Metric Logic
const last60 = state.currentTrace.slice(-60);
let stability = 0;
last60.forEach(p => stability += Math.hypot(p.x, p.y));
const holdQ = Math.max(0, Math.min(100, 100 - (stability/last60.length)*3));

document.getElementById('sc-hold').innerText = Math.round(holdQ);
document.getElementById('sc-real').innerText = Math.round(score * 9.1);
document.getElementById('trivia-box').innerText = "DATA: " + trivia[Math.floor(Math.random()*trivia.length)];

drawTrace();
}

function drawTrace() {
const c = document.getElementById('trace-canvas');
const ctx = c.getContext('2d');
const w = c.width = c.offsetWidth;
const h = c.height = c.offsetHeight;
ctx.translate(w/2, h/2);

// Target Rings
ctx.strokeStyle = "#cbd5e1";
for(let r=1; r<9; r++){ ctx.beginPath(); ctx.arc(0,0, r*15, 0, Math.PI*2); ctx.stroke(); }

// Trace
ctx.lineWidth = 1.5; ctx.strokeStyle = "#2563eb"; ctx.beginPath();
state.currentTrace.forEach((p, i) => {
if(i === 0) ctx.moveTo(p.x*3, p.y*3); else ctx.lineTo(p.x*3, p.y*3);
});
ctx.stroke();

// Impact
const lp = state.currentTrace[state.currentTrace.length - 1];
ctx.fillStyle = "red"; ctx.beginPath();
ctx.arc(lp.x*3, (lp.y + state.pelletDropPx)*3, 4, 0, Math.PI*2);
ctx.fill();
}

function nextShot() {
if(state.shotNum >= state.maxShots) {
alert("Match Finished. Score: " + state.total.toFixed(1));
location.reload();
return;
}
state.shotNum++;
document.getElementById('scatt-screen').classList.add('hidden');
document.getElementById('viewport').classList.remove('hidden');
resetShot();
requestAnimationFrame(loop);
}

function beep(f, t, d) {
const o = state.audio.createOscillator(); const g = state.audio.createGain();
o.type = t; o.frequency.value = f;
g.gain.setValueAtTime(0.1, state.audio.currentTime);
g.gain.exponentialRampToValueAtTime(0.01, state.audio.currentTime + d);
o.connect(g); g.connect(state.audio.destination);
o.start(); o.stop(state.audio.currentTime + d);
}
</script>
</body>
</html>
