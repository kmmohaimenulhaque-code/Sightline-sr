<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SCATT Pro | ISSF Competition Suite</title>
<style>
:root {
--bg-dark: #0c0c0e;
--panel-steel: #1a1a1e;
--accent-gold: #d4af37;
--swiss-yellow: #ffcc00;
--target-white: #ffffff;
--target-border: #e2e8f0;
/* FIXED DIMENSIONS for cross-device consistency */
--tgt-size: 160px;
--tgt-black: 56px;
--tgt-10ring: 11px;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; user-select: none; }
body { background: var(--bg-dark); color: #fff; height: 100vh; overflow: hidden; touch-action: none; }

/* --- UI Screens --- */
.screen {
position: fixed; inset: 0; z-index: 100;
display: flex; align-items: center; justify-content: center;
background: radial-gradient(circle at center, #1e1e22 0%, #0c0c0e 100%);
}
.hidden { display: none !important; }

.glass-card {
background: var(--panel-steel); padding: 2.5rem; border-radius: 8px;
width: 90%; max-width: 450px; border: 1px solid #2d2d33;
box-shadow: 0 30px 60px rgba(0,0,0,0.8); text-align: center;
}

h1 { font-weight: 200; letter-spacing: 4px; text-transform: uppercase; color: var(--accent-gold); margin-bottom: 2rem; }

.mode-btn {
background: #27272a; border: 1px solid #3f3f46; color: #fff;
padding: 1.2rem; width: 100%; margin-bottom: 1rem; border-radius: 4px;
cursor: pointer; transition: 0.2s; text-align: left; display: flex; justify-content: space-between; align-items: center;
}
.mode-btn:hover { border-color: var(--accent-gold); background: #2d2d33; }
.mode-btn b { color: var(--swiss-yellow); }

/* --- Range Viewport --- */
#viewport {
position: relative; width: 100vw; height: 100vh;
background: linear-gradient(to bottom, #334155, #0f172a);
display: flex; align-items: center; justify-content: center;
}

.hud-overlay {
position: absolute; top: 0; width: 100%; padding: 15px 30px;
display: flex; justify-content: space-between; align-items: center;
background: rgba(0,0,0,0.8); border-top: 3px solid var(--swiss-yellow); z-index: 60;
}

/* --- High Visibility Target --- */
#target-master {
position: absolute; width: var(--tgt-size); height: var(--tgt-size);
background: var(--target-white);
border: 2px solid var(--target-border);
box-shadow: 0 0 0 10px rgba(0,0,0,0.1), 0 20px 50px rgba(0,0,0,0.5);
display: flex; align-items: center; justify-content: center;
}
/* Visual Rings for better definition */
.ring-line { position: absolute; border: 0.5px solid #cbd5e1; border-radius: 50%; }
.ring-black { position: absolute; border-radius: 50%; width: var(--tgt-black); height: var(--tgt-black); background: #111; border: 1px solid #000; }
.ring-10 { position: absolute; border-radius: 50%; width: var(--tgt-10ring); height: var(--tgt-10ring); border: 0.5px solid rgba(255,255,255,0.8); }

/* --- Sights --- */
#sight-base { position: absolute; top: 50%; left: 50%; z-index: 10; pointer-events: none; }
#sight-layer { position: absolute; transform: translate(-50%, -50%); }
.front-blade { position: absolute; bottom: 50%; left: 50%; transform: translateX(-50%); width: 14px; height: 48px; background: #000; border-top: 2px solid #444; }
.rear-notch { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); width: 70px; height: 48px; border-left: 24px solid #000; border-right: 24px solid #000; border-bottom: 24px solid #000; }

/* --- SCATT Monitor --- */
.monitor-white { background: #fff; color: #000; padding: 1.5rem; border-radius: 4px; margin-bottom: 1rem; text-align: left; }
canvas { background: #fff; width: 100%; height: 220px; border: 1px solid #e2e8f0; margin: 10px 0; }
.data-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
.data-box { background: #f1f5f9; padding: 8px; border-radius: 2px; }
.data-box small { font-size: 0.6rem; color: #64748b; text-transform: uppercase; display: block; font-weight: 800; }
.data-box b { font-size: 1.1rem; color: #1e293b; }

/* --- Controls --- */
#controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; pointer-events: none; z-index: 70; }
.joy-base { pointer-events: auto; position: relative; width: 140px; height: 140px; background: #1a1a1e; border-radius: 50%; border: 3px solid #000; }
.btn-move { position: absolute; width: 44px; height: 44px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #666; font-size: 0.7rem; }
#fire-btn { pointer-events: auto; width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #ef4444, #991b1b); border: 4px solid #000; color: #fff; font-weight: 900; }

.btn-next { background: var(--accent-gold); color: #000; padding: 15px; width: 100%; border: none; font-weight: 800; text-transform: uppercase; cursor: pointer; }
</style>
</head>
<body>

<div id="app">
<div id="mode-screen" class="screen">
<div class="glass-card">
<h1>Select Mode</h1>
<button class="mode-btn" onclick="selectMode('qualification')">
<span>Qualification Session</span>
<b>60 Shots</b>
</button>
<button class="mode-btn" onclick="selectMode('final')">
<span>Olympic Final</span>
<b>24 Shots</b>
</button>
</div>
</div>

<div id="viewport" class="hidden">
<div class="hud-overlay">
<div id="hud-info">SHOT <span id="hud-shot">1</span>/<span id="hud-max">24</span></div>
<div id="hud-timer" style="color:var(--swiss-yellow); font-family: monospace; font-size: 1.4rem;">60.00</div>
<div id="hud-score">TOTAL: <span id="hud-total">0.0</span></div>
</div>

<div id="target-master">
<div class="ring-line" style="width:140px; height:140px;"></div>
<div class="ring-line" style="width:110px; height:110px;"></div>
<div class="ring-line" style="width:80px; height:80px;"></div>
<div class="ring-black"></div>
<div class="ring-10"></div>
<div id="bullseye-coord" style="position:absolute"></div>
</div>

<div id="sight-base">
<div id="sight-layer">
<div class="front-blade"><div id="aim-tip" style="position:absolute;top:0;left:50%"></div></div>
<div class="rear-notch"></div>
</div>
</div>

<div id="controls">
<div class="joy-base">
<div class="btn-move" style="top:5px;left:48px;" onmousedown="move(0,-1.2)" onmouseup="stop()" ontouchstart="move(0,-1.2)" ontouchend="stop()">UP</div>
<div class="btn-move" style="bottom:5px;left:48px;" onmousedown="move(0,1.2)" onmouseup="stop()" ontouchstart="move(0,1.2)" ontouchend="stop()">DOWN</div>
<div class="btn-move" style="left:5px;top:48px;" onmousedown="move(-1.2,0)" onmouseup="stop()" ontouchstart="move(-1.2,0)" ontouchend="stop()">LEFT</div>
<div class="btn-move" style="right:5px;top:48px;" onmousedown="move(1.2,0)" onmouseup="stop()" ontouchstart="move(1.2,0)" ontouchend="stop()">RIGHT</div>
</div>
<button id="fire-btn" onclick="fire()">RELEASE</button>
</div>
</div>

<div id="scatt-screen" class="screen hidden">
<div class="glass-card" style="max-width:500px; background: #e2e8f0;">
<div class="monitor-white">
<div style="display:flex; justify-content:space-between; align-items:flex-end; border-bottom:2px solid #e2e8f0; padding-bottom:5px;">
<span id="sc-shot-label" style="font-weight:800; color:#64748b;">SHOT #01</span>
<span id="sc-score" style="font-size:2.5rem; font-weight:900;">10.9</span>
</div>
<canvas id="trace-canvas"></canvas>
<div class="data-row">
<div class="data-box"><small>Stability</small><b><span id="sc-hold">0</span>%</b></div>
<div class="data-box"><small>Realization</small><b><span id="sc-real">0</span>%</b></div>
<div class="data-box"><small>Hold Time</small><b><span id="sc-time">0.0</span>s</b></div>
<div class="data-box"><small>Points</small><b><span id="sc-pts">0</span></b></div>
</div>
</div>
<p id="trivia-text" style="color:#475569; font-size:0.8rem; margin-bottom:15px; text-align:left; border-left:2px solid var(--accent-gold); padding-left:10px;"></p>
<button class="btn-next" onclick="next()">Continue</button>
</div>
</div>
</div>

<script>
const trivia = [
"The 10-ring is just 11.5mm across – smaller than a penny.",
"Pellets travel at ~150 m/s – slower than a paintball gun.",
"Minimum trigger pull must be 1,000 grams.",
"Optical sights and lasers are strictly banned in ISSF.",
"A perfect 60-shot score is 600, achieved only twice in history.",
"The X-ring (Inner Ten) is only 5mm wide.",
"A single 8.0 in the final usually results in elimination."
];

const state = {
mode: 'final', maxShots: 24, shotNum: 1, total: 0,
userX: 0, userY: 0, oscTime: 0,
timer: 60, timerInt: null,
currentTrace: [], isFiring: false,
audio: new (window.AudioContext || window.webkitAudioContext)()
};

function selectMode(m) {
state.mode = m;
state.maxShots = (m === 'qualification') ? 60 : 24;
document.getElementById('hud-max').innerText = state.maxShots;
document.getElementById('mode-screen').classList.add('hidden');
document.getElementById('viewport').classList.remove('hidden');
resetShot();
requestAnimationFrame(loop);
}

function resetShot() {
state.timer = 60;
state.currentTrace = [];
state.userX = 0; state.userY = 0;
state.isFiring = false;
document.getElementById('hud-shot').innerText = state.shotNum;
document.getElementById('hud-total').innerText = state.total.toFixed(1);
startTimer();
}

function startTimer() {
clearInterval(state.timerInt);
state.timerInt = setInterval(() => {
state.timer -= 0.01;
document.getElementById('hud-timer').innerText = state.timer.toFixed(2);
if(state.timer <= 0) fire(true);
}, 10);
}

function loop() {
if(state.isFiring) return;
state.oscTime += 0.015;
// REDUCED OSCILLATION: professional level hold
const ox = (Math.sin(state.oscTime * 0.7) * 4) + (Math.sin(state.oscTime * 1.9) * 1.5);
const oy = (Math.cos(state.oscTime * 0.6) * 3.5) + (Math.sin(state.oscTime * 1.5) * 2);

const tx = state.userX + ox;
const ty = state.userY + oy;

document.getElementById('sight-layer').style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px))`;

const bull = document.getElementById('bullseye-coord').getBoundingClientRect();
const tip = document.getElementById('aim-tip').getBoundingClientRect();
state.currentTrace.push({ x: tip.left - bull.left, y: tip.top - bull.top + (0.19 * 37.8) });

requestAnimationFrame(loop);
}

let moveInt;
function move(dx, dy) { moveInt = setInterval(() => { state.userX += dx; state.userY += dy; }, 16); }
function stop() { clearInterval(moveInt); }

function fire(timeout = false) {
state.isFiring = true;
clearInterval(state.timerInt);
beep(120, 'square', 0.1);

let score = 0;
if(!timeout) {
const lp = state.currentTrace[state.currentTrace.length - 1];
const dist = Math.hypot(lp.x, lp.y) / 37.8;
score = Math.max(0, (11.0 - (dist / 0.08))).toFixed(1);
}
state.total += parseFloat(score);
showScatt(score);
}

function showScatt(score) {
document.getElementById('viewport').classList.add('hidden');
document.getElementById('scatt-screen').classList.remove('hidden');
document.getElementById('sc-shot-label').innerText = "SHOT #" + state.shotNum.toString().padStart(2, '0');
document.getElementById('sc-score').innerText = score;

const timeTaken = (60 - state.timer).toFixed(1);
document.getElementById('sc-time').innerText = timeTaken;
document.getElementById('sc-pts').innerText = state.currentTrace.length;

// Hold Quality Logic
const lastSec = state.currentTrace.slice(-60);
let moveSum = 0;
lastSec.forEach(p => moveSum += Math.hypot(p.x, p.y));
const holdQ = Math.max(0, Math.min(100, 100 - (moveSum/lastSec.length)*2));

document.getElementById('sc-hold').innerText = Math.round(holdQ);
document.getElementById('sc-real').innerText = Math.round(score * 9.17);
document.getElementById('trivia-text').innerText = "FACT: " + trivia[Math.floor(Math.random()*trivia.length)];

drawTrace();
}

function drawTrace() {
const c = document.getElementById('trace-canvas');
const ctx = c.getContext('2d');
const w = c.width = c.offsetWidth;
const h = c.height = c.offsetHeight;
ctx.translate(w/2, h/2);

ctx.strokeStyle = "#e2e8f0";
for(let r=1; r<8; r++){ ctx.beginPath(); ctx.arc(0,0, r*18, 0, Math.PI*2); ctx.stroke(); }

ctx.lineWidth = 1.5; ctx.strokeStyle = "#2563eb"; ctx.beginPath();
state.currentTrace.forEach((p, i) => {
if(i === 0) ctx.moveTo(p.x*2, p.y*2); else ctx.lineTo(p.x*2, p.y*2);
});
ctx.stroke();

const last = state.currentTrace[state.currentTrace.length - 1];
ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(last.x*2, last.y*2, 4, 0, Math.PI*2); ctx.fill();
}

function next() {
if(state.shotNum >= state.maxShots) {
alert(`Competition Finished!\nTotal Score: ${state.total.toFixed(1)}`);
location.reload();
return;
}
state.shotNum++;
document.getElementById('scatt-screen').classList.add('hidden');
document.getElementById('viewport').classList.remove('hidden');
resetShot();
requestAnimationFrame(loop);
}

function beep(f, t, d) {
const o = state.audio.createOscillator(); const g = state.audio.createGain();
o.type = t; o.frequency.value = f;
g.gain.setValueAtTime(0.1, state.audio.currentTime);
g.gain.exponentialRampToValueAtTime(0.01, state.audio.currentTime + d);
o.connect(g); g.connect(state.audio.destination);
o.start(); o.stop(state.audio.currentTime + d);
}
</script>
</body>
</html>
